<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swopnil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="hero">
    <div class="hero-frame">
      <p class="eyebrow">Hi, I’m</p>
      <h1 class="hero-title">Swopnil</h1>
      <p class="hero-copy">
        
        <span class="typing"></span><span class="cursor">|</span>
      </p>
      <p class="hero-note">
        <span class="highlighted-link">hello@swop-nil.com</span>
      </br>
        <a class="simple-accent-link" href="https://www.linkedin.com/in/swop-nil" target="_blank" rel="noopener">linkedin</a>
        <a class="simple-accent-link" href="https://github.com/s00pin" target="_blank" rel="noopener">github</a>
      </p>
    </div>
  </main>

  <script>
    const phrases = [
      'Full-stack developer',
      'Belgium-based'
      
    ];
    const typingElement = document.querySelector('.typing');
    let phraseIndex = 0;
    let charIndex = 0;
    let adding = true;

    function tick() {
      const current = phrases[phraseIndex];
      if (adding) {
        charIndex += 1;
        typingElement.textContent = current.slice(0, charIndex);
        if (charIndex === current.length) {
          adding = false;
          setTimeout(tick, 1400);
          return;
        }
      } else {
        charIndex -= 1;
        typingElement.textContent = current.slice(0, charIndex);
        if (charIndex === 0) {
          adding = true;
          phraseIndex = (phraseIndex + 1) % phrases.length;
          setTimeout(tick, 400);
          return;
        }
      }
      setTimeout(tick, adding ? 80 : 35);
    }

    document.addEventListener('contextmenu', (e) => e.preventDefault());
    tick();
  </script>
</body>
</html>
